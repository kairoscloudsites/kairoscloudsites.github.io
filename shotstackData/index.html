<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Shotstack data</title>
        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: #f5f5f5;
                color: #333;
                padding: 20px;
            }
            h1 {
                margin-bottom: 20px;
            }
            .tabs {
                display: flex;
                gap: 4px;
                margin-bottom: 16px;
            }
            .tab {
                padding: 10px 24px;
                background: #ddd;
                border: none;
                border-radius: 8px 8px 0 0;
                cursor: pointer;
                font-size: 15px;
            }
            .tab.active {
                background: #fff;
                font-weight: 600;
            }
            .panel {
                background: #fff;
                border-radius: 0 8px 8px 8px;
                padding: 20px;
                box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th,
            td {
                text-align: left;
                padding: 8px 10px;
                border-bottom: 1px solid #eee;
                font-size: 14px;
            }
            th {
                background: #f9f9f9;
                font-weight: 600;
                position: sticky;
                top: 0;
            }
            td input {
                width: 100%;
                border: 1px solid transparent;
                padding: 4px 6px;
                border-radius: 4px;
                font-size: 14px;
                background: transparent;
            }
            td input:focus {
                border-color: #3382c3;
                outline: none;
                background: #fff;
            }
            tr:hover td input {
                background: #f9f9f9;
            }
            .actions {
                display: flex;
                gap: 8px;
                margin-top: 16px;
                align-items: center;
            }
            .btn {
                padding: 8px 20px;
                border: none;
                border-radius: 6px;
                cursor: pointer;
                font-size: 14px;
                font-weight: 500;
            }
            .btn-primary {
                background: #3382c3;
                color: #fff;
            }
            .btn-primary:hover {
                background: #2a6da3;
            }
            .btn-danger {
                background: #e74c3c;
                color: #fff;
            }
            .btn-danger:hover {
                background: #c0392b;
            }
            .btn-secondary {
                background: #eee;
                color: #333;
            }
            .btn-secondary:hover {
                background: #ddd;
            }
            .btn-sm {
                padding: 4px 10px;
                font-size: 12px;
            }
            .status {
                margin-left: auto;
                font-size: 13px;
                color: #888;
            }
            .status.success {
                color: #27ae60;
            }
            .status.error {
                color: #e74c3c;
            }
            .loading {
                text-align: center;
                padding: 40px;
                color: #999;
            }
            .row-num {
                width: 30px;
                color: #aaa;
                font-size: 12px;
                text-align: center;
                user-select: none;
            }
            .del-cell {
                width: 30px;
                text-align: center;
            }
            .del-btn {
                background: none;
                border: none;
                color: #ccc;
                cursor: pointer;
                font-size: 16px;
            }
            .del-btn:hover {
                color: #e74c3c;
            }
            .table-wrap {
                max-height: 70vh;
                overflow-y: auto;
            }
        </style>
    </head>
    <body>
        <h1>Shotstack data</h1>
        <div class="tabs">
            <button class="tab active" onclick="switchTab('accounts')">
                Jostens Accounts
            </button>
            <button class="tab" onclick="switchTab('videos')">
                Video Library
            </button>
        </div>
        <div class="panel">
            <div class="table-wrap">
                <table id="dataTable">
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div class="actions">
                <button class="btn btn-secondary" onclick="addRow()">
                    + Add Row
                </button>
                <button class="btn btn-primary" onclick="saveAll()">
                    Save Changes
                </button>
                <span id="status" class="status"></span>
            </div>
        </div>

        <script>
            let param = new URLSearchParams(window.location.search).get("api");

            const API = "https://" + param;
            let currentTab = "accounts";
            let data = {}; // { accounts: {headers, rows}, videos: {headers, rows} }
            let dirty = false;

            async function loadData() {
                document.getElementById("tableBody").innerHTML =
                    '<tr><td colspan="10" class="loading">Loading...</td></tr>';
                try {
                    const res = await fetch(`${API}/?doc=${currentTab}`);
                    const json = await res.json();
                    data[currentTab] = json;
                    renderTable();
                    setStatus("");
                } catch (e) {
                    setStatus("Failed to load: " + e.message, true);
                }
            }

            function renderTable() {
                const d = data[currentTab];
                if (!d) return;

                const headers = d.headers || [];
                const rows = d.rows || [];

                // Render header
                const thead = document.getElementById("tableHead");
                thead.innerHTML =
                    '<tr><th class="row-num">#</th>' +
                    headers.map((h) => `<th>${h}</th>`).join("") +
                    '<th class="del-cell"></th></tr>';

                // Render rows
                const tbody = document.getElementById("tableBody");
                tbody.innerHTML = rows
                    .map(
                        (row, i) =>
                            "<tr>" +
                            `<td class="row-num">${i + 1}</td>` +
                            headers
                                .map(
                                    (h) =>
                                        `<td><input value="${escapeHtml(row[h] || "")}" data-row="${i}" data-col="${h}" onchange="onEdit(this)"></td>`,
                                )
                                .join("") +
                            `<td class="del-cell"><button class="del-btn" title="Delete row" onclick="deleteRow(${i})">×</button></td>` +
                            "</tr>",
                    )
                    .join("");
            }

            function escapeHtml(s) {
                return s
                    .replace(/&/g, "&amp;")
                    .replace(/"/g, "&quot;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function onEdit(input) {
                const row = parseInt(input.dataset.row);
                const col = input.dataset.col;
                data[currentTab].rows[row][col] = input.value;
                dirty = true;
            }

            function addRow() {
                const d = data[currentTab];
                if (!d) return;
                const newRow = {};
                d.headers.forEach((h) => (newRow[h] = ""));
                d.rows.push(newRow);
                renderTable();
                dirty = true;
                // Scroll to bottom
                const wrap = document.querySelector(".table-wrap");
                wrap.scrollTop = wrap.scrollHeight;
            }

            function deleteRow(index) {
                if (!confirm(`Delete row ${index + 1}?`)) return;
                data[currentTab].rows.splice(index, 1);
                renderTable();
                dirty = true;
            }

            async function saveAll() {
                const d = data[currentTab];
                if (!d) return;

                setStatus("Saving...");
                try {
                    const res = await fetch(`${API}/?doc=${currentTab}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            rows: d.rows,
                            headers: d.headers,
                        }),
                    });
                    const json = await res.json();
                    if (json.success) {
                        setStatus(`Saved ${json.count} rows`, false);
                        dirty = false;
                    } else {
                        setStatus("Error: " + (json.error || "Unknown"), true);
                    }
                } catch (e) {
                    setStatus("Save failed: " + e.message, true);
                }
            }

            function switchTab(tab) {
                if (
                    dirty &&
                    !confirm("You have unsaved changes. Switch anyway?")
                )
                    return;
                dirty = false;
                currentTab = tab;
                document
                    .querySelectorAll(".tab")
                    .forEach((t) => t.classList.remove("active"));
                event.target.classList.add("active");
                if (data[tab]) {
                    renderTable();
                } else {
                    loadData();
                }
            }

            function setStatus(msg, isError) {
                const el = document.getElementById("status");
                el.textContent = msg;
                el.className =
                    "status" +
                    (isError === true
                        ? " error"
                        : isError === false
                          ? " success"
                          : "");
            }

            // Initial load
            loadData();
        </script>
    </body>
</html>
